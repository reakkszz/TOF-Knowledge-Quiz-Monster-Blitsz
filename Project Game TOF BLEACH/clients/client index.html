<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOF General Knowledge Quiz - Monster blitzz</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --monster-pink: #ff85a1;
            --monster-yellow: #f9db7d;
            --monster-blue: #70d6ff;
            --monster-green: #99d98c;
            --monster-purple: #b392ac;
            --bg-soft: #fefae0;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: var(--bg-soft);
            background-image: 
                radial-gradient(var(--monster-blue) 1px, transparent 1px),
                radial-gradient(var(--monster-pink) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .menu {
            position: fixed; inset: 0;
            background: var(--monster-blue);
            z-index: 1000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 12px;
            overflow-y: auto; padding: 20px;
        }

        .menu h1 {
            font-size: 50px; color: white;
            text-shadow: 6px 6px 0 var(--monster-purple);
            margin-bottom: 10px; text-align: center;
        }

        .input {
            width: 320px; padding: 14px;
            border-radius: 20px; border: 4px solid var(--monster-purple);
            font-size: 18px; text-align: center; outline: none;
        }

        .menu-btn {
            width: 320px; padding: 14px;
            border-radius: 25px; border: none;
            font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }

        .solo { background: var(--monster-green); color: white; box-shadow: 0 6px 0 #76b066; }
        .create { background: var(--monster-yellow); color: #5c4d1a; box-shadow: 0 6px 0 #d4a373; }
        .join { background: white; color: var(--monster-purple); box-shadow: 0 6px 0 #8a6d85; }
        .util { background: var(--monster-purple); color: white; box-shadow: 0 6px 0 #7a5e74; }
        .menu-btn:hover { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

        /* Modal Pop Up Populer Style */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 2000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-box {
            background: white; padding: 30px; border-radius: 30px;
            border: 6px solid var(--monster-purple); width: 100%; max-width: 450px;
            text-align: center; box-shadow: 10px 10px 0 var(--monster-purple);
        }

        .game {
            width: 90%; max-width: 800px; background: white;
            border: 8px solid var(--monster-purple); border-radius: 50px;
            padding: 40px; box-shadow: 15px 15px 0px var(--monster-purple);
            animation: wobble 4s ease-in-out infinite;
        }

        @keyframes wobble {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.02) rotate(1deg); }
        }

        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .room {
            background: var(--monster-yellow); padding: 10px 20px;
            border-radius: 20px; color: #5c4d1a; font-weight: bold;
            transform: rotate(-2deg); box-shadow: 4px 4px 0 #d4a373;
        }

        .timer {
            width: 80px; height: 80px; background: white;
            border: 6px solid #333; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 32px; font-weight: bold; color: #333;
        }

        .question { text-align: center; font-size: 28px; color: #444; margin: 40px 0; min-height: 80px; }

        .answers { display: flex; gap: 20px; }
        .btn {
            flex: 1; height: 75px; border: none; border-radius: 25px;
            font-size: 24px; font-weight: bold; cursor: pointer;
            transition: 0.2s; color: white;
        }
        .true { background: var(--monster-green); box-shadow: 0 8px 0 #76b066; }
        .false { background: var(--monster-pink); box-shadow: 0 8px 0 #d66d81; }
        .btn:hover { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .btn:disabled { background: #ccc !important; box-shadow: 0 8px 0 #999 !important; cursor: not-allowed; opacity: 0.6; }

        .winner {
            display: none; position: fixed; inset: 0;
            background: rgba(112, 214, 255, 0.98); z-index: 9999;
            justify-content: center; align-items: center; padding: 20px;
        }

        .winner-content {
            background: white; padding: 40px; border-radius: 40px;
            border: 8px solid var(--monster-purple); text-align: center;
            max-width: 500px; width: 100%; box-shadow: 15px 15px 0px var(--monster-purple);
        }

        .winner h1 { font-size: 48px; color: var(--monster-pink); text-shadow: 3px 3px 0 #333; margin-bottom: 20px; }
        .global-stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: var(--bg-soft); padding: 15px; border-radius: 20px; border: 3px solid var(--monster-green); }
        .leaderboard-list { list-style: none; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 20px; max-height: 160px; overflow-y: auto; }
        .leaderboard-list li { padding: 10px; border-bottom: 2px dashed #ddd; display: flex; justify-content: space-between; font-weight: bold; }
        .play-again-btn { margin-top: 25px; width: 100%; background: var(--monster-yellow) !important; color: #5c4d1a !important; box-shadow: 0 8px 0 #d4a373 !important; }
        .scoreboard { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .player { text-align: center; padding: 10px; background: #eee; border-radius: 15px; min-width: 100px; }
    </style>
</head>

<body>

    <div class="menu" id="mainMenu">
        <h1>TRUE OR FALSE</h1>
        <input type="text" id="name" class="input" placeholder="Your Name">
        
        <button class="menu-btn solo" onclick="startSingleplayer()">MODE SINGLEPLAYER (SOLO)</button>
        
        <div style="width: 320px; height: 2px; background: rgba(255,255,255,0.3); margin: 5px 0;"></div>
        
        <input type="text" id="roomCode" class="input" placeholder="Enter Room Code (Mabar)">
        <button class="menu-btn create" onclick="createRoom()">CREATE MULTIPLAYER ROOM</button>
        <button class="menu-btn join" onclick="joinRoom()">JOIN MULTIPLAYER ROOM</button>
        
        <div style="width: 320px; height: 2px; background: rgba(255,255,255,0.3); margin: 5px 0;"></div>
        
        <button class="menu-btn util" onclick="viewStatsMenu()">LIHAT STATISTIK PERSONAL</button>
        <button class="menu-btn util" onclick="viewLeaderboardMenu()">LIHAT GLOBAL LEADERBOARD</button>
    </div>

    <div id="leaderboardModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color: var(--monster-purple); margin-bottom: 15px;">TOP 5 SHINIGAMI</h2>
            <ul id="menu-leaderboard-list" class="leaderboard-list" style="max-height: 240px;">
                <li>Memuat data...</li>
            </ul>
            <button class="menu-btn join" style="margin-top: 20px; width:100%;" onclick="closeModal('leaderboardModal')">TUTUP</button>
        </div>
    </div>

    <div id="statsModal" class="modal-overlay">
        <div class="modal-box">
            <h2 id="statsTitle" style="color: var(--monster-green); margin-bottom: 15px;">YOUR STATS</h2>
            <div class="global-stats" style="margin-bottom: 15px;">
                <div class="stat-card">
                    <small>TOTAL HIGH SCORE</small><br>
                    <span id="menu-total-score" style="font-weight:bold; font-size:20px;">0 Pts</span>
                </div>
                <div class="stat-card">
                    <small>AVG SPEED</small><br>
                    <span id="menu-avg-speed" style="font-weight:bold; font-size:20px;">0 ms</span>
                </div>
            </div>
            <button class="menu-btn join" style="width:100%;" onclick="closeModal('statsModal')">TUTUP</button>
        </div>
    </div>

    <div id="winnerScreen" class="winner">
        <div class="winner-content">
            <p style="font-weight: bold; color: #666;">CONGRATULATIONS</p>
            <h1 id="winnerText">PLAYER WIN</h1>
            
            <div class="stats-container">
                <div class="global-stats">
                    <div class="stat-card">
                        <small>YOUR AVG SPEED</small><br>
                        <span id="avg-speed">0 ms</span>
                    </div>
                    <div class="stat-card">
                        <small>YOUR ACCURACY</small><br>
                        <span id="accuracy">0%</span>
                    </div>
                </div>

                <div id="match-result-box">
                    <h3 style="margin-bottom: 8px; color: var(--monster-pink);">MATCH RESULT</h3>
                    <div id="match-result-list" style="background: #fff3f5; padding: 12px; border-radius: 20px; border: 3px solid var(--monster-pink); margin-bottom: 15px; font-weight: bold; text-align: left;">
                    </div>
                </div>

                <h3 style="margin-bottom: 10px; color: var(--monster-purple);">TOP 5 SHINIGAMI</h3>
                <ul id="leaderboard-list" class="leaderboard-list">
                    <li>Memuat data...</li>
                </ul>
            </div>

            <button class="menu-btn play-again-btn" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <div class="game">
        <div class="top">
            <div class="room" id="room">ROOM : -</div>
            <div class="timer" id="timer">8</div>
        </div>

        <div class="question" id="question">Waiting for opponent...</div>

        <div class="answers">
            <button id="btn-true" class="btn true" onclick="answer(true)">TRUE</button>
            <button id="btn-false" class="btn false" onclick="answer(false)">FALSE</button>
        </div>

        <div class="scoreboard" id="scoreboard"></div>
    </div>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        const socket = io("http://localhost:3000");
        let currentRoom = "";
        let savedMyName = ""; 

        function hideMenu() { document.getElementById("mainMenu").style.display = "none"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        // EKSEKUSI MODE SINGLEPLAYER
        function startSingleplayer(){
            const name = document.getElementById("name").value.trim();
            if(!name) return alert("Please enter your name first!");
            savedMyName = name;
            socket.emit("START_SINGLEPLAYER", name);
            hideMenu();
        }

        function createRoom(){
            const name = document.getElementById("name").value.trim();
            if(!name) return alert("Please enter your name");
            savedMyName = name;
            socket.emit("CREATE_ROOM", name);
            hideMenu();
        }

        function joinRoom(){
            const playerName = document.getElementById("name").value.trim();
            const roomCode = document.getElementById("roomCode").value.toUpperCase().trim();
            if(!playerName || !roomCode) return alert("Fill name and room code");
            savedMyName = playerName;
            currentRoom = roomCode;
            socket.emit("JOIN_ROOM", { roomCode, playerName });
            hideMenu();
        }

        // AMBIL DATA LEADERBOARD DARI FRONT MENU
        function viewLeaderboardMenu() {
            document.getElementById("leaderboardModal").style.display = "flex";
            const menuLbList = document.getElementById("menu-leaderboard-list");
            menuLbList.innerHTML = "<li>Memuat data...</li>";
            
            fetch('http://localhost/php-api/get_stats.php')
                .then(res => res.json())
                .then(statsData => {
                    if(statsData.leaderboard && statsData.leaderboard.length > 0) {
                        menuLbList.innerHTML = statsData.leaderboard.map((user, index) => `
                            <li>
                                <span>#${index + 1} ${user.Username || user.player_name}</span>
                                <span>${user.TotalScore || user.score} Pts</span>
                            </li>
                        `).join('');
                    } else {
                        menuLbList.innerHTML = "<li>Belum ada skor tersimpan</li>";
                    }
                })
                .catch(err => {
                    menuLbList.innerHTML = "<li>Gagal memuat database</li>";
                });
        }

        // AMBIL DATA STATISTIK PERSONAL BERDASARKAN INPUT NAMA DI HALAMAN DEPAN
        function viewStatsMenu() {
            const name = document.getElementById("name").value.trim();
            if(!name) return alert("Masukkan nama lu di kolom input nama untuk melihat statistik data lu!");
            
            document.getElementById("statsModal").style.display = "flex";
            document.getElementById("statsTitle").innerText = name.toUpperCase() + "'S STATS";
            
            // Tarik seluruh data stats global, cari baris yang sesuai nama player
            fetch('http://localhost/php-api/get_stats.php')
                .then(res => res.json())
                .then(statsData => {
                    const dataUser = statsData.leaderboard.find(u => (u.Username || u.player_name).toLowerCase() === name.toLowerCase());
                    if(dataUser) {
                        document.getElementById("menu-total-score").innerText = (dataUser.TotalScore || dataUser.score) + " Pts";
                        document.getElementById("menu-avg-speed").innerText = (dataUser.AvgResponseTime || dataUser.response_time || "0") + " ms";
                    } else {
                        document.getElementById("menu-total-score").innerText = "0 Pts";
                        document.getElementById("menu-avg-speed").innerText = "0 ms";
                    }
                })
                .catch(err => {
                    alert("Gagal menarik data statistik personal dari PHP server.");
                });
        }

        function answer(value){
            if(!currentRoom) return;
            document.getElementById("btn-true").disabled = true;
            document.getElementById("btn-false").disabled = true;
            socket.emit("ANSWER", { roomCode: currentRoom, answer: value });
        }

        socket.on("ROOM_CREATED", (roomCode) => {
            currentRoom = roomCode; 
            document.getElementById("room").innerText = "ROOM: " + roomCode;
        });

        socket.on("NEW_QUESTION", (data) => {
            document.getElementById("question").innerText = data.question;
            const timerEl = document.getElementById("timer");
            timerEl.innerText = data.timer;
            timerEl.style.color = "#333";
            timerEl.style.borderColor = "#333";

            document.getElementById("btn-true").disabled = false;
            document.getElementById("btn-false").disabled = false;
        });

        socket.on("WAITING_FOR_OPPONENT_FINISH", () => {
            document.getElementById("question").innerText = "You finished! Waiting for opponent to complete the quiz...";
            document.getElementById("btn-true").disabled = true;
            document.getElementById("btn-false").disabled = true;
        });

        socket.on("TIMER_UPDATE", (timer) => {
            const timerEl = document.getElementById("timer");
            timerEl.innerText = timer;
            timerEl.style.color = timer <= 3 ? "#ff4d4d" : "#333";
            timerEl.style.borderColor = timer <= 3 ? "#ff4d4d" : "#333";
        });

        socket.on("GAME_OVER", (data) => {
            document.getElementById("btn-true").disabled = true;
            document.getElementById("btn-false").disabled = true;
            document.getElementById("winnerScreen").style.display = "flex";
            
            document.getElementById("winnerText").innerText = data.winner.toUpperCase();

            const personal = data.personalStats;
            document.getElementById("avg-speed").innerText = personal.avgSpeed + " ms";
            document.getElementById("accuracy").innerText = personal.accuracy + "%";

            // Sembunyikan perbandingan skor match result kalau main sendirian (Singleplayer)
            if(data.isSingleplayer) {
                document.getElementById("match-result-box").style.display = "none";
            } else {
                document.getElementById("match-result-box").style.display = "block";
                const matchResultEl = document.getElementById("match-result-list");
                matchResultEl.innerHTML = data.roomPlayers.map(p => {
                    const isMe = p.name.toLowerCase() === savedMyName.toLowerCase();
                    return `
                        <div style="display: flex; justify-content: space-between; padding: 4px 0; color: #333;">
                            <span>${p.name} ${isMe ? ' <strong>(You)</strong>' : ''}</span>
                            <span>${p.score} Pts</span>
                        </div>
                    `;
                }).join('');
            }

            // Update data leaderboard akhir game
            setTimeout(() => {
                fetch('http://localhost/php-api/get_stats.php')
                    .then(res => res.json())
                    .then(statsData => {
                        const lbList = document.getElementById("leaderboard-list");
                        if(statsData.leaderboard && statsData.leaderboard.length > 0) {
                            lbList.innerHTML = statsData.leaderboard.map((user, index) => `
                                <li>
                                    <span>#${index + 1} ${user.Username || user.player_name}</span>
                                    <span>${user.TotalScore || user.score} Pts</span>
                                </li>
                            `).join('');
                        } else {
                            lbList.innerHTML = "<li>Belum ada data skor</li>";
                        }
                    })
                    .catch(err => {
                        document.getElementById("leaderboard-list").innerHTML = "<li>Gagal memuat data</li>";
                    });
            }, 1000);
        });

        socket.on("UPDATE_SCORE", (players) => {
            const scoreboard = document.getElementById("scoreboard");
            scoreboard.innerHTML = players.map(p => `
                <div class="player">
                    <h2>${p.name}</h2>
                    <p>${p.score} Pts</p>
                </div>
            `).join('');
        });

        socket.on("ERROR_MESSAGE", (message) => {
            alert(message);
            document.getElementById("mainMenu").style.display = "flex";
        });
    </script>
</body>
</html>
